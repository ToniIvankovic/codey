name: AWS CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Flutter
      run: |
        git clone https://github.com/flutter/flutter.git --depth 1 -b stable
        echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH

    - name: Build Flutter web app
      run: |
        cd codey
        flutter pub get
        flutter build web --dart-define ENV="prod"

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1

    - name: Sync output to S3
      run: |
        aws s3 sync ./codey/build/web s3://codey-fe \
          --exclude "index.html" \
          --exclude "flutter_service_worker.js" \
          --exclude "version.json"

        aws s3 cp ./codey/build/web/index.html s3://codey-fe/index.html \
          --cache-control "no-cache, no-store, must-revalidate"
        aws s3 cp ./codey/build/web/flutter_service_worker.js s3://codey-fe/flutter_service_worker.js \
          --cache-control "no-cache, no-store, must-revalidate"
        aws s3 cp ./codey/build/web/version.json s3://codey-fe/version.json \
          --cache-control "no-cache, no-store, must-revalidate"

  invalidate-cloudfront:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
    - name: Invalidate Cloudfront Cache
      uses: chetan/invalidate-cloudfront-action@master
      env:
        AWS_ACCESS_KEY_ID:      ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY:  ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION:             eu-central-1
        DISTRIBUTION:           ${{ vars.AWS_CF_DISTRIBUTION_ID_WEB }}
        PATHS: '/*'